<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url(../exr001/fontes/Inter-VariableFont_opsz\,wght.ttf);
        }

        html{
            display: flex;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
        }

        main {
            background-color: rgb(241, 241, 241);
            padding: 50px;
            border-radius: 10%;
            font-family: Inter;
        }

        h1 {
            margin-top: 0px;
        }

        input, select {
            border: 1;
            padding: 5px;
            border-radius: 10px;
            margin: 1px;
        }

        div#resposta {
            display: flex;
            align-items: center;
        }

        button{
            border-radius: 15%;
            border: 0;
            padding: 10px;
        }

        button:hover {
            background-color: rgb(232, 232, 232);
        }

        p {
            margin: 0px 10px;
        }
    </style>
</head>
<body>
    <main>
        <h1>CALCULADORA</h1>
        <form method="get">
            <div>
                <label for="n1">Número 1: </label>
                <input type="number" id="n1" required>
            </div>
            <div>
                <label for=""></label>
            </div>
            <div>
                <label for="op">Operação desejada: </label>
                <select name="op" id="op">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            </div>
            <div>
                 <label for="n2">Número 2: </label>
                <input type="number" id="n2" required>
            </div>
            <div id="resposta">
                <button type="button" onclick="calc()">=</button>
            <p id="resp">
        
            </p>
            </div>
        </form>
    </main>
    <script>
        function calc(){
            let n1 = document.getElementById("n1").value
            let n2 = document.getElementById("n2").value
            let op = document.getElementById("op").value
            let resposta

            switch(op){
                case "+": 
                    resposta = Number(n1) + Number(n2);
                    document.getElementById("resp").innerHTML = resposta;
                break;
                case "-":
                    resposta = Number(n1) - Number(n2);
                    document.getElementById("resp").innerHTML = resposta;
                break;
                case "*":
                    resposta = Number(n1) * Number(n2);
                    document.getElementById("resp").innerHTML = resposta;
                break;
                case "/":
                    resposta = Number(n1) / Number(n2);
                    document.getElementById("resp").innerHTML = resposta;
                break;
            }
        }
    </script>
</body>
</html>
