<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>peaga</title>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url(fontes/Inter-VariableFont_opsz\,wght.ttf);
        }
        
        body {
            font-family: Inter;
        }

        input, button {
            border-radius: 5px;
            border: 0;
            background-color: whitesmoke;
            padding: 7px;
        }
    </style>
</head>
<body>
    <h1>Calculadora de idade pelo ano</h1>
    <form method="post" autocomplete="on">
        
        <p>
            <label for="nome">Digite seu nome: </label>
            <input type="text" name="nome" id="nome" required>
        </p>
        <p>
            <label for="ano">Em que ano você nasceu?: </label>
            <input type="number" id="ano" min="0" max="2026" required>
            <button type="button" onclick="calcIdade()">Calcular</button>
        </p>
        
        <p id="texto">
        </p>

         <div><output id="iidade"></output></div>

        <div>
            <input type="submit">
            <input type="reset" value="limpar">
        </div>
    </form>
    <script>
        function calcIdade() {
            let anoAtual = new Date().getFullYear()
            let nome = document.getElementById("nome").value
            let ano = document.getElementById("ano").value
            let idade = Number(anoAtual) - Number(ano)
            iidade.innerHTML = idade
            
            document.getElementById("texto").innerHTML = nome + ", este ano você completa " + iidade.innerHTML + " anos. Parabéns!"
        }
    </script>
</body>
</html>
