<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>peaga</title>
</head>
<body>
    <h1>Calculadora de idade</h1>
    <form action="cadastro.js" method="post" autocomplete="on">
        
        <p>
            <label for="ano">Em que ano você nasceu?: </label>
            <input type="number" id="ano" min="0" max="2026" value="2026" oninput="idade.innerHTML = Number(2026) - Number(ano.value)">
        </p>
        <p>
             Sua idade é 
            <output id="idade"></output>
        </p>

        <div>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </div>
    </form>
</body>
</html>
