<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro.php" method="get">
        <p>
            <label for="estado">Estado: </label>
            <select name="estado" id="estado">
                <optgroup label="Região Sudeste">
                    <option value="MG">Minas Gerais</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="SP">São Paulo</option>
                </optgroup>
                <optgroup label="Região Sul">
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="SC">Santa Catarina</option>
                </optgroup>
            </select>
        </p>
        <p>
            <label for="profissa">Profissão: </label>
            <input type="text" name="profissa" id="profissa" list="listprofissa">
            <datalist id="listprofissa">
                <option>Carpinteiro</option>
                <option>Pizzaiolo</option>
                <option>Desenvolvedor</option>
            </datalist>
        </p>
        <p>
            <label for="msg">Mensagem: </label><br>
            <textarea name="msg" id="msg" cols="30" rows="12"></textarea>
        </p>
        <!-- Como o método get tem um limite de 3000baits, é preferível utilizar o post aqui, por causa da menasagem que não tem limite de caracteres. -->
        <p>
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
