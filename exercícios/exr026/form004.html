<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro.php" method="get">
        <fieldset>
            <legend> Dados Pessoais</legend>
            <p>
                <label for="Nome">Nome:
                </label>
                <input type="text" name="Nome" id="Nome" required>
            </p>
            <p>
                <label for="email">e-mail: </label>
                <input type="email" name="email" id="email" autocomplete="email" required>
            </p>
            <p>
                <label for="telefone">telefone: </label>
                <input type="tel" name="telefone" id="telefone" autocomplete="tel" pattern="^\(\d{2}\) \d{4,5}-\d{4}$" placeholder="(DDD) 01234-5678"> <!--pode ser [0-9] no lugar de "\d" //  \(\) <- abre e fecha parênteses-->
            </p>
        </fieldset>
        <!-- Estudar sobre RegEx -->
        <div>
            <input type="submit">
            <input type="reset">
        </div>
    </form>
</body>
</html>
