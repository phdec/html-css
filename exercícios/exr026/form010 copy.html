<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>peaga</title>
    <style>
        input {
            border-radius: 5px;
            border: 0;
            background-color: whitesmoke;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Calculadora de idade</h1>
    <form action="cadastro.js" method="post" autocomplete="on">
        
        <p>
            <label for="ano">Em que ano você nasceu?: </label>
            <input type="number" id="ano" min="0" max="2026" value="2026" oninput="calcIdade()">
        </p>
        <p>
            Você completa
            <output id="idade">0</output>
            anos este ano. Parabéns!
        </p>

        <div>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </div>
    </form>
    <script>
        function calcIdade() {
            let anoAtual = new Date().getFullYear()
            idade.innerHTML = Number(anoAtual) - Number(ano.value)
        }
        
    </script>
</body>
</html>
