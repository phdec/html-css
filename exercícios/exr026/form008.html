<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teste de formulário</h1>
    <form action="cadastro.js" method="get">
        <p>
            <label for="n1">Número 1: </label>
            <input type="number" name="n1" id="n1" required oninput="soma.innerHTML = Number(n1.value) + Number(n2.value)">
        </p>
        <p>
            <label for="n2">Número 2: </label>
            <input type="number" name="n2" id="n2" required oninput="soma.innerHTML = Number(n1.value) + Number(n2.value)">
        </p>
        <p>
            <label for="soma">Soma: </label>
            <output name="soma" id="soma"></output> <!-- O OUTPUT NÃO É ENVIADO QUANDO SUBMIT É APERTADO, OU SEJA APENAS APARECE NA TELA, MAS NÃO É ENVIADO COMO UM DADO. O NUM 1 E NUM 2 SIM, POIS SÃO INPUT. -->
        </p>
        <div>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </div>
    </form>
</body>
</html>
